spring.application.name=Sistema de Gestion Estudiantil

server.port=${SERVER_PORT:${PORT:8080}}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/students}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eminem2023}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Actuator & Prometheus ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Histogramas para percentiles de tiempo de respuesta HTTP (p50, p95, p99)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=10ms,50ms,100ms,200ms,500ms,1s,2s

# Histogramas para operaciones de repositorio (tiempo en base de datos)
management.metrics.distribution.percentiles-histogram.spring.data.repository.invocations=true
management.metrics.distribution.percentiles.spring.data.repository.invocations=0.5,0.95,0.99

