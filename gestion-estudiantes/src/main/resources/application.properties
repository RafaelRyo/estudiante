spring.application.name=Sistema de Gestion Estudiantil

server.port=${SERVER_PORT:${PORT:8081}}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/students}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eminem2023}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Actuator & Prometheus ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Histogramas para percentiles de tiempo de respuesta HTTP (p50, p95, p99)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=10ms,50ms,100ms,200ms,500ms,1s,2s

# Histogramas para operaciones de repositorio (tiempo en base de datos)
management.metrics.distribution.percentiles-histogram.spring.data.repository.invocations=true
management.metrics.distribution.percentiles.spring.data.repository.invocations=0.5,0.95,0.99

# ── AWS SQS ───────────────────────────────────────────────────────────────────
# Usar la URL completa de la cola SQS para evitar que Spring Cloud AWS intente crearla.
# Formato: https://sqs.{region}.amazonaws.com/{account-id}/{queue-name}
# Ejemplo: https://sqs.us-east-1.amazonaws.com/902982161420/students-queue
aws.sqs.queue-name=${SQS_QUEUE_NAME:students-queue}

# Region de AWS (se detecta automaticamente via IMDSv2 en EC2/ECS si no se define)
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}

# Credenciales: en AWS se usa IAM Role (dejar en blanco).
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}

# IMPORTANTE: usar FAIL en lugar de CREATE para que no intente crear la cola.
# La cola debe existir previamente en AWS SQS.
spring.cloud.aws.sqs.listener.queue-not-found-strategy=fail

# Configuracion del listener SQS
spring.cloud.aws.sqs.listener.max-concurrent-messages=10
spring.cloud.aws.sqs.listener.max-messages-per-poll=10

