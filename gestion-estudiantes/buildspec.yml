version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Preparing Gradle wrapper..."
      - chmod +x gradlew

  build:
    commands:
      - echo "Building executable JAR..."
      - ./gradlew clean bootJar --no-daemon
      - echo "Listing generated artifacts..."
      - ls -la build/libs/
      - echo "Preparing artifacts for Elastic Beanstalk..."
      - mkdir -p output
      - cp build/libs/*.jar output/
      - cp Procfile output/
      - cp -r .ebextensions output/

artifacts:
  files:
    - '**/*'
  base-directory: output

cache:
  paths:
    - '/root/.gradle/**/*'
