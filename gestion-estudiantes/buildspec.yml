version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Preparing Gradle wrapper..."
      - chmod +x gradlew

  build:
    commands:
      - echo "Building executable JAR..."
      - ./gradlew clean bootJar --no-daemon
      - echo "Listing generated artifacts..."
      - ls -la build/libs/


cache:
  paths:
    - '/root/.gradle/**/*'
