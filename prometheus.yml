global:
  scrape_interval: 15s       # Cada cuánto se recogen métricas
  evaluation_interval: 15s   # Cada cuánto se evalúan las reglas

scrape_configs:
  - job_name: 'gestion-estudiantes'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      # En local usa host.docker.internal:8080
      # En AWS sustituye por la IP/DNS privada o pública del microservicio
      - targets: ['${APP_HOST:host.docker.internal}:${APP_PORT:8080}']
        labels:
          application: 'Sistema de Gestion Estudiantil'
          environment: '${ENV:local}'

